name: Migrate releases

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/migrate-releases.yml"
  workflow_dispatch:
    inputs:
      overwrite:
        description: "Delete and recreate releases that already exist"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      OLD_REPO: Becauseiloveyo/ctf-compass1
      NEW_REPO: Becauseiloveyo/ctf-compass
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      OVERWRITE: ${{ github.event_name == 'workflow_dispatch' && inputs.overwrite || 'true' }}

    steps:
      - name: Migrate release assets and notes
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p migrated-releases
          curl -fsSL "https://api.github.com/repos/${OLD_REPO}/releases?per_page=100" > migrated-releases/releases.json

          release_count=$(jq 'length' migrated-releases/releases.json)
          if [ "$release_count" -eq 0 ]; then
            echo "No releases found in $OLD_REPO"
            exit 1
          fi

          latest_tag=$(jq -r '.[0].tag_name' migrated-releases/releases.json)
          echo "Found ${release_count} release(s). Latest source release: ${latest_tag}"

          jq -c 'reverse[]' migrated-releases/releases.json | while read -r release_json; do
            tag=$(jq -r '.tag_name' <<< "$release_json")
            name=$(jq -r '.name // .tag_name' <<< "$release_json")
            body=$(jq -r '.body // ""' <<< "$release_json")
            prerelease=$(jq -r '.prerelease' <<< "$release_json")
            draft=$(jq -r '.draft' <<< "$release_json")

            if [ "$draft" = "true" ]; then
              echo "Skipping draft release $tag"
              continue
            fi

            echo "--- Migrating $tag ---"
            release_dir="migrated-releases/$tag"
            asset_dir="$release_dir/assets"
            mkdir -p "$asset_dir"
            printf '%s' "$body" > "$release_dir/body.md"

            if gh release view "$tag" --repo "$NEW_REPO" >/dev/null 2>&1; then
              if [ "$OVERWRITE" = "true" ]; then
                echo "Existing release $tag found; deleting it before migration."
                gh release delete "$tag" --repo "$NEW_REPO" --cleanup-tag --yes
              else
                echo "Existing release $tag found; skipping because overwrite=false."
                continue
              fi
            fi

            jq -c '.assets[]?' <<< "$release_json" | while read -r asset_json; do
              asset_name=$(jq -r '.name' <<< "$asset_json")
              asset_url=$(jq -r '.browser_download_url' <<< "$asset_json")
              echo "Downloading $asset_name"
              curl -fL --retry 3 --retry-delay 2 -o "$asset_dir/$asset_name" "$asset_url"
            done

            shopt -s nullglob
            assets=("$asset_dir"/*)
            shopt -u nullglob

            create_args=(release create "$tag" --repo "$NEW_REPO" --target main --title "$name" --notes-file "$release_dir/body.md")
            if [ "$prerelease" = "true" ]; then
              create_args+=(--prerelease)
            fi
            if [ "$tag" = "$latest_tag" ]; then
              create_args+=(--latest=true)
            else
              create_args+=(--latest=false)
            fi

            if [ "${#assets[@]}" -gt 0 ]; then
              gh "${create_args[@]}" "${assets[@]}"
            else
              gh "${create_args[@]}"
            fi
          done

          echo "Release migration complete."

# Trigger migration using public source-release reads.
